services:
  web:
    build: .
    user: "${UID:-1000}:${GID:-1000}"
    group_add:
      # Grant access to /var/run/docker.sock. Run `stat -c %g /var/run/docker.sock`
      # on the host to find the correct GID, then set DOCKER_GID in .env.local if needed.
      - "${DOCKER_GID:-962}"
    env_file:
      - path: .env.local
        required: false
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - ./src:/app/src
      - ./config.toml:/app/config.toml
      - ./src/rover/jobs.db:/app/src/rover/jobs.db

  authelia:
    image: authelia/authelia:latest
    container_name: authelia
    user: "${UID:-1000}:${GID:-1000}"
    volumes:
      - ./authelia:/config
    restart: unless-stopped
    expose:
      - "9091"

  nginx:
    image: nginx:alpine
    container_name: nginx
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/certs:/etc/nginx/certs:ro
    ports:
      - "80:80"
      - "443:443"
    depends_on:
      - web
      - authelia
    restart: unless-stopped
