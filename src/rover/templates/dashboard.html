{% extends "base.html" %}

{% block content %}
<section>
    <form action="/scan" method="POST" id="scan-form">
        <div class="grid" style="margin-bottom: 2rem;">
            <button type="button" id="btn_scan_repo" class="">Scan Git Repository</button>
            <button type="button" id="btn_scan_image" class="secondary outline">Scan Docker Image</button>
        </div>
        <input type="hidden" name="scan_type" id="scan_type_hidden" value="repo">

        <div id="repo-selection-area">
            <label for="repo_id">Target Repository</label>
            <select id="repo_id" name="repo_id">
                <option value="" disabled selected>Select a mapped repository...</option>
                {% for repo in repositories %}
                <option value="{{ repo.id }}">{{ repo.url }}</option>
                {% endfor %}
            </select>

            <label>Git Ref</label>
            <div role="group" id="ref-type-group" style="margin-bottom: 1rem;">
                <button type="button" class="ref-btn" data-type="branch">Branch</button>
                <button type="button" class="ref-btn outline" data-type="tag">Tag</button>
                <button type="button" class="ref-btn outline" data-type="commit">Commit</button>
            </div>
            <input type="hidden" id="ref_type" name="ref_type" value="branch">

            <div style="margin-bottom: 1rem;">
                <select id="git_ref_branch" class="ref-input">
                    <option value="" disabled selected>Select a repository first...</option>
                </select>

                <select id="git_ref_tag" class="ref-input" style="display: none;">
                    <option value="" disabled selected>Select a repository first...</option>
                </select>

                <input type="text" id="git_ref_commit" class="ref-input" placeholder="Enter commit hash..."
                    style="display: none;">
            </div>
            <input type="hidden" name="git_ref" id="git_ref_final">
        </div>

        <div id="image-selection-area" style="display: none;">
            <label for="image_id">Target Image</label>
            <select id="image_id" name="image_id">
                <option value="" disabled selected>Select a mapped image...</option>
                {% for image in images %}
                <option value="{{ image.id }}">{{ image.name }}</option>
                {% endfor %}
            </select>

            <label for="image_tag">Image Tag</label>
            <div style="margin-bottom: 1rem;">
                <select id="image_tag" class="ref-input">
                    <option value="" disabled selected>Select an image first...</option>
                </select>
            </div>
            <small>If no tag is selected, `skopeo` might pull `latest` depending on the registry.</small>
        </div>

        <button type="submit" style="margin-top: 1rem;">Start Vulnerability Scan</button>
    </form>
</section>

<section>
    <h2>Scan History</h2>
    <figure>
        <table>
            <thead>
                <tr>
                    <th>Repository</th>
                    <th>Ref</th>
                    <th>Status</th>
                    <th>Created</th>
                    <th>Action</th>
                </tr>
            </thead>
            <tbody id="queue-body">
                {% include 'queue_table.html' %}
            </tbody>
        </table>
    </figure>
</section>

<section>
    <h2>Artifact Bundles (Packages)</h2>
    <div style="margin-bottom: 1rem;">
        <button type="button" class="outline" onclick="document.getElementById('add-package-modal').showModal();">Create
            Package</button>
    </div>
    <figure>
        <table>
            <thead>
                <tr>
                    <th>Name</th>
                    <th>Version</th>
                    <th>Created</th>
                    <th>Action</th>
                </tr>
            </thead>
            <tbody>
                {% for pkg in packages %}
                <tr>
                    <td>{{ pkg.name }}</td>
                    <td>{{ pkg.version }}</td>
                    <td>{{ pkg.created_at }}</td>
                    <td><a href="/packages/{{ pkg.id }}" role="button" class="outline">View Dashboard</a></td>
                </tr>
                {% else %}
                <tr>
                    <td colspan="4">No packages found.</td>
                </tr>
                {% endfor %}
            </tbody>
        </table>
    </figure>
</section>

<script>
    // Auto-poll the queue table every 3 seconds
    setInterval(() => {
        fetch('/api/queue_table')
            .then(response => response.text())
            .then(html => {
                document.getElementById('queue-body').innerHTML = html;
            })
            .catch(error => console.error('Error fetching queue status:', error));
    }, 3000);

    // Advanced Ref Selection Logic
    const repoSelect = document.getElementById('repo_id');
    const branchSelect = document.getElementById('git_ref_branch');
    const tagSelect = document.getElementById('git_ref_tag');
    const commitInput = document.getElementById('git_ref_commit');
    const scanForm = document.getElementById('scan-form');
    const finalRefInput = document.getElementById('git_ref_final');
    const refBtns = document.querySelectorAll('.ref-btn');
    const refTypeHidden = document.getElementById('ref_type');

    function updateVisibility() {
        const selectedType = refTypeHidden.value;
        branchSelect.style.display = selectedType === 'branch' ? 'block' : 'none';
        tagSelect.style.display = selectedType === 'tag' ? 'block' : 'none';
        commitInput.style.display = selectedType === 'commit' ? 'block' : 'none';
    }

    refBtns.forEach(btn => {
        btn.addEventListener('click', () => {
            // Revert all to outline
            refBtns.forEach(b => b.classList.add('outline'));
            // Fill the clicked one
            btn.classList.remove('outline');

            refTypeHidden.value = btn.dataset.type;
            updateVisibility();
        });
    });

    repoSelect.addEventListener('change', (e) => {
        const repoId = e.target.value;
        if (!repoId) return;

        branchSelect.innerHTML = '<option value="" disabled selected>Fetching branches...</option>';
        tagSelect.innerHTML = '<option value="" disabled selected>Fetching tags...</option>';

        fetch(`/api/repos/${repoId}/refs`)
            .then(res => res.json())
            .then(data => {
                if (data.error) {
                    console.error(data.error);
                    branchSelect.innerHTML = '<option value="" disabled selected>Failed to load branches</option>';
                    tagSelect.innerHTML = '<option value="" disabled selected>Failed to load tags</option>';
                    return;
                }

                branchSelect.innerHTML = '<option value="" disabled selected>Select a branch...</option>';
                data.branches.forEach(b => {
                    const opt = document.createElement('option');
                    opt.value = b;
                    opt.textContent = b;
                    branchSelect.appendChild(opt);
                });

                tagSelect.innerHTML = '<option value="" disabled selected>Select a tag...</option>';
                data.tags.forEach(t => {
                    const opt = document.createElement('option');
                    opt.value = t;
                    opt.textContent = t;
                    tagSelect.appendChild(opt);
                });
            })
            .catch(err => {
                console.error("Error fetching refs:", err);
                branchSelect.innerHTML = '<option value="" disabled selected>Error loading refs</option>';
                tagSelect.innerHTML = '<option value="" disabled selected>Error loading refs</option>';
            });
    });

    const imageSelect = document.getElementById('image_id');
    const imageTagSelect = document.getElementById('image_tag');

    imageSelect.addEventListener('change', (e) => {
        const imageId = e.target.value;
        if (!imageId) return;

        imageTagSelect.innerHTML = '<option value="" disabled selected>Fetching tags...</option>';

        fetch(`/api/images/${imageId}/refs`)
            .then(res => res.json())
            .then(data => {
                if (data.error) {
                    console.error(data.error);
                    imageTagSelect.innerHTML = '<option value="" disabled selected>Failed to load tags</option>';
                    return;
                }

                imageTagSelect.innerHTML = '<option value="" disabled selected>Select a tag (optional)...</option>';
                data.tags.forEach(t => {
                    const opt = document.createElement('option');
                    opt.value = t;
                    opt.textContent = t;
                    imageTagSelect.appendChild(opt);
                });
            })
            .catch(err => {
                console.error("Error fetching image tags:", err);
                imageTagSelect.innerHTML = '<option value="" disabled selected>Error loading tags</option>';
            });
    });

    scanForm.addEventListener('submit', (e) => {
        const scanType = document.getElementById('scan_type_hidden').value;

        if (scanType === 'repo') {
            const selectedType = refTypeHidden.value;
            let selectedRef = '';

            if (selectedType === 'branch') {
                selectedRef = branchSelect.value;
            } else if (selectedType === 'tag') {
                selectedRef = tagSelect.value;
            } else {
                selectedRef = commitInput.value;
            }

            if (!selectedRef) {
                e.preventDefault();
                alert('Please select or enter a Git Ref before scanning.');
                return;
            }
            finalRefInput.value = selectedRef;

            if (!repoSelect.value) {
                e.preventDefault();
                alert('Please select a repository.');
                return;
            }
        } else if (scanType === 'image') {
            if (!imageSelect.value) {
                e.preventDefault();
                alert('Please select a Docker Image before scanning.');
                return;
            }
            if (imageTagSelect.value) {
                finalRefInput.value = imageTagSelect.value;
            } else {
                finalRefInput.value = '';
            }
        }
    });

    const btnScanRepo = document.getElementById('btn_scan_repo');
    const btnScanImage = document.getElementById('btn_scan_image');
    const scanTypeHidden = document.getElementById('scan_type_hidden');
    const areaRepo = document.getElementById('repo-selection-area');
    const areaImage = document.getElementById('image-selection-area');

    function setTab(tabName) {
        if (tabName === 'image') {
            scanTypeHidden.value = 'image';
            btnScanImage.classList.remove('outline', 'secondary');
            btnScanRepo.classList.add('outline', 'secondary');
            areaRepo.style.display = 'none';
            areaImage.style.display = 'block';
        } else {
            scanTypeHidden.value = 'repo';
            btnScanRepo.classList.remove('outline', 'secondary');
            btnScanImage.classList.add('outline', 'secondary');
            areaRepo.style.display = 'block';
            areaImage.style.display = 'none';
        }
    }

    btnScanRepo.addEventListener('click', () => setTab('repo'));
    btnScanImage.addEventListener('click', () => setTab('image'));

    // Select tab based on URL parameter if present
    const urlParams = new URLSearchParams(window.location.search);
    if (urlParams.get('tab') === 'image') {
        setTab('image');
    }
</script>
{% endblock %}
