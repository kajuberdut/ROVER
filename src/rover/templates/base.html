<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ title|default("R.O.V.E.R Dashboard") }}</title>
    <link rel="icon" href="/static/favicon.svg" type="image/svg+xml">
    <link rel="stylesheet" href="/static/css/pico.min.css">
    <style>
        body {
            padding-top: 2rem;
        }

        /* Hamburger menu overrides for Pico CSS */
        .hamburger-menu summary::after {
            display: none !important;
        }

        .hamburger-menu summary {
            background: transparent !important;
            border: none !important;
            box-shadow: none !important;
            padding: 0.5rem !important;
            cursor: pointer;
        }

        .hamburger-menu summary:active {
            background: transparent !important;
            box-shadow: none !important;
            outline: none !important;
        }

        /* Toast Component overrides */
        #global-toast {
            position: fixed;
            top: 1rem;
            right: 1rem;
            z-index: 9999;
            transform: translateX(150%);
            transition: transform 0.4s ease-out;
            margin: 0;
            padding: 1rem 1.5rem;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
            background-color: var(--pico-del-color);
            color: white;
            border-radius: var(--pico-border-radius);
            display: flex;
            align-items: center;
            gap: 1rem;
        }

        #global-toast.show {
            transform: translateX(0);
        }

        #global-toast button.close {
            background: none;
            border: none;
            color: white;
            padding: 0;
            font-size: 1.25rem;
            line-height: 1;
            cursor: pointer;
            opacity: 0.8;
        }

        #global-toast button.close:hover {
            opacity: 1;
            background: transparent;
        }
    </style>
</head>

<body>
    <header class="container">
        <nav>
            <ul>
                <li>
                    <hgroup style="margin-bottom: 0;">
                        <h1>R.O.V.E.R</h1>
                        <h2>Release Oriented Vulnerability Evaluation & Reporting</h2>
                    </hgroup>
                </li>
            </ul>
            <ul>
                <li>
                    <details class="dropdown hamburger-menu">
                        <summary aria-label="Menu">
                            <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                                stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                                <line x1="3" y1="12" x2="21" y2="12"></line>
                                <line x1="3" y1="6" x2="21" y2="6"></line>
                                <line x1="3" y1="18" x2="21" y2="18"></line>
                            </svg>
                        </summary>
                        <ul dir="rtl">
                            <li><a href="#"
                                    onclick="document.getElementById('add-repo-modal')?.showModal(); event.preventDefault();">Add
                                    Repository</a></li>
                            <li><a href="#"
                                    onclick="document.getElementById('add-image-modal')?.showModal(); event.preventDefault();">Add
                                    Docker Image</a></li>
                            <li><a href="#"
                                    onclick="document.getElementById('add-package-modal')?.showModal(); event.preventDefault();">Create
                                    Package</a></li>
                        </ul>
                    </details>
                </li>
            </ul>
        </nav>
    </header>
    <main class="container">
        {% block content %}{% endblock %}
    </main>
    <footer class="container">
        <small>Generated by R.O.V.E.R Dashboard</small>
    </footer>

    <dialog id="add-repo-modal">
        <article>
            <header>
                <button aria-label="Close" rel="prev"
                    onclick="document.getElementById('add-repo-modal').close();"></button>
                <strong>Add Repository</strong>
            </header>
            <form action="/repo" method="POST" style="margin-bottom: 0;">
                <fieldset role="group">
                    <input type="url" name="target_url" placeholder="https://github.com/organization/repo" required
                        style="margin-bottom: 0;">
                    <input type="submit" value="Add Repo" style="width: auto; margin-bottom: 0;">
                </fieldset>
            </form>
        </article>
    </dialog>

    <dialog id="add-image-modal">
        <article>
            <header>
                <button aria-label="Close" rel="prev"
                    onclick="document.getElementById('add-image-modal').close();"></button>
                <strong>Add Docker Image</strong>
            </header>
            <form action="/image" method="POST" style="margin-bottom: 0;">
                <fieldset role="group">
                    <input type="text" name="target_name" placeholder="ubuntu:latest or ghcr.io/org/image:tag" required
                        style="margin-bottom: 0;">
                    <input type="submit" value="Add Image" style="width: auto; margin-bottom: 0;">
                </fieldset>
            </form>
        </article>
    </dialog>

    <dialog id="add-package-modal">
        <article>
            <header>
                <button aria-label="Close" rel="prev"
                    onclick="document.getElementById('add-package-modal').close();"></button>
                <strong>Create Package</strong>
            </header>
            <form action="/packages" method="POST" style="margin-bottom: 0;">
                <fieldset>
                    <label>Package Name
                        <input type="text" name="package_name" placeholder="e.g., v1.0 Release Bundle" required>
                    </label>
                    <label>Version
                        <input type="text" name="package_version" placeholder="e.g., 1.0.0" required>
                    </label>
                    <input type="submit" value="Create Package" style="margin-top: 1rem;">
                </fieldset>
            </form>
        </article>
    </dialog>

    <div id="global-toast">
        <span id="global-toast-message">An error occurred.</span>
        <button class="close" onclick="document.getElementById('global-toast').classList.remove('show');"
            aria-label="Close">&times;</button>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const urlParams = new URLSearchParams(window.location.search);
            if (urlParams.has('error')) {
                const errorType = urlParams.get('error');
                const toast = document.getElementById('global-toast');
                const messageEl = document.getElementById('global-toast-message');

                if (errorType === 'package_not_found') {
                    messageEl.textContent = 'Package not found or has been deleted.';
                } else {
                    messageEl.textContent = errorType;
                }

                toast.classList.add('show');

                // Keep toast open slightly longer automatically
                setTimeout(() => {
                    toast.classList.remove('show');
                }, 5000);

                // Clean up URL without reloading page
                const newUrl = new URL(window.location);
                newUrl.searchParams.delete('error');
                window.history.replaceState({}, '', newUrl);
            }
        });
    </script>
</body>

</html>
