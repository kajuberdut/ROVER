<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ title|default("R.O.V.E.R Dashboard") }}</title>
    <link rel="icon" href="/static/favicon.svg" type="image/svg+xml">
    <link rel="stylesheet" href="/static/css/pico.min.css">
    <style>
        body {
            padding-top: 2rem;
        }

        /* Hamburger menu overrides for Pico CSS */
        .hamburger-menu summary::after {
            display: none !important;
        }

        .hamburger-menu summary {
            background: transparent !important;
            border: none !important;
            box-shadow: none !important;
            padding: 0.5rem !important;
            cursor: pointer;
        }

        .hamburger-menu summary:active {
            background: transparent !important;
            box-shadow: none !important;
            outline: none !important;
        }

        /* Toast Component overrides */
        #global-toast {
            position: fixed;
            top: 1rem;
            right: 1rem;
            z-index: 9999;
            transform: translateX(150%);
            transition: transform 0.4s ease-out;
            margin: 0;
            padding: 1rem 1.5rem;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
            background-color: var(--pico-del-color);
            color: white;
            border-radius: var(--pico-border-radius);
            display: flex;
            align-items: center;
            gap: 1rem;
        }

        #global-toast.show {
            transform: translateX(0);
        }

        #global-toast button.close {
            background: none;
            border: none;
            color: white;
            padding: 0;
            font-size: 1.25rem;
            line-height: 1;
            cursor: pointer;
            opacity: 0.8;
        }

        #global-toast button.close:hover {
            opacity: 1;
            background: transparent;
        }
    </style>
    <script>
        function setupAutoPoll(endpoint, targetElementId, intervalMs = 3000) {
            setInterval(() => {
                fetch(endpoint)
                    .then(response => response.text())
                    .then(html => {
                        const target = document.getElementById(targetElementId);
                        if (target) {
                            target.innerHTML = html;
                        }
                    })
                    .catch(error => console.error(`Error polling ${endpoint}:`, error));
            }, intervalMs);
        }
    </script>
</head>

<body>
    <header class="container">
        <nav>
            <ul>
                <li>
                    <hgroup style="margin-bottom: 0;">
                        <h1><a href="/" style="color: inherit; text-decoration: none;">R.O.V.E.R</a></h1>
                        <h2>Release Oriented Vulnerability Evaluation & Reporting</h2>
                    </hgroup>
                </li>
            </ul>
            <ul>
                <li>
                    <a href="/config" class="secondary" style="display: flex; align-items: center; gap: 0.5rem; text-decoration: none;">
                        <span style="font-size: 1.2em;">⚙️</span> Settings
                    </a>
                </li>
            </ul>
        </nav>
    </header>
    <main class="container">
        {% block content %}{% endblock %}
    </main>
    <footer class="container">
        <small>Generated by R.O.V.E.R Dashboard</small>
    </footer>
    <dialog id="add-product-modal">
        <article>
            <header>
                <button aria-label="Close" rel="prev"
                    onclick="document.getElementById('add-product-modal').close();"></button>
                <strong>Create Product</strong>
            </header>
            <form action="/products" method="POST" style="margin-bottom: 0;">
                <fieldset>
                    <label>Product Name
                        <input type="text" name="product_name" placeholder="e.g., Core API Webserver" required>
                    </label>
                    <label>Description (Optional)
                        <input type="text" name="product_description" placeholder="A brief description...">
                    </label>
                    <input type="submit" value="Create Product" style="margin-top: 1rem;">
                </fieldset>
            </form>
        </article>
    </dialog>

    <div id="global-toast">
        <span id="global-toast-message">An error occurred.</span>
        <button class="close" onclick="document.getElementById('global-toast').classList.remove('show');"
            aria-label="Close">&times;</button>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            // Toast logic
            const urlParams = new URLSearchParams(window.location.search);
            if (urlParams.has('error')) {
                const errorType = urlParams.get('error');
                const toast = document.getElementById('global-toast');
                const messageEl = document.getElementById('global-toast-message');

                if (errorType === 'release_not_found') {
                    messageEl.textContent = 'Release not found or has been deleted.';
                } else {
                    messageEl.textContent = errorType;
                }

                toast.classList.add('show');

                // Keep toast open slightly longer automatically
                setTimeout(() => {
                    toast.classList.remove('show');
                }, 5000);

                // Clean up URL without reloading page
                const newUrl = new URL(window.location);
                newUrl.searchParams.delete('error');
                window.history.replaceState({}, '', newUrl);
            }

            // EOL Autocomplete logic
            const eolNameInput = document.getElementById('eol_target_name');
            const eolVersionInput = document.getElementById('eol_target_version');
            const namesList = document.getElementById('eol_names_list');
            const versionsList = document.getElementById('eol_versions_list');

            if (eolNameInput) {
                // Fetch all components to populate the names datalist
                fetch('/api/eol/all')
                    .then(res => res.json())
                    .then(data => {
                        const fragment = document.createDocumentFragment();
                        data.forEach(name => {
                            const opt = document.createElement('option');
                            opt.value = name;
                            fragment.appendChild(opt);
                        });
                        namesList.appendChild(fragment);
                    })
                    .catch(err => console.error("Failed to fetch EOL names", err));

                // When a name is entered or selected, fetch its versions
                eolNameInput.addEventListener('change', (e) => {
                    const val = e.target.value;
                    if (!val) return;

                    // Clear existing versions
                    versionsList.innerHTML = '';
                    eolVersionInput.value = '';

                    fetch(`/api/eol/${val}`)
                        .then(res => {
                            if (!res.ok) throw new Error("Component not found");
                            return res.json();
                        })
                        .then(data => {
                            const fragment = document.createDocumentFragment();
                            data.forEach(item => {
                                const opt = document.createElement('option');
                                opt.value = item.cycle;
                                fragment.appendChild(opt);
                            });
                            versionsList.appendChild(fragment);
                        })
                        .catch(err => console.log("No version data for this component", err));
                });
            }
        });
    </script>
</body>

</html>
