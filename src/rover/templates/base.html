<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ title|default("R.O.V.E.R Dashboard") }}</title>
    <link rel="stylesheet" href="/static/css/pico.min.css">
    <style>
        body {
            padding-top: 2rem;
        }

        /* Hamburger menu overrides for Pico CSS */
        .hamburger-menu summary::after {
            display: none !important;
        }

        .hamburger-menu summary {
            background: transparent !important;
            border: none !important;
            box-shadow: none !important;
            padding: 0.5rem !important;
            cursor: pointer;
        }

        .hamburger-menu summary:hover,
        .hamburger-menu summary:focus,
        .hamburger-menu summary:active {
            background: transparent !important;
            box-shadow: none !important;
            outline: none !important;
        }
    </style>
</head>

<body>
    <header class="container">
        <nav>
            <ul>
                <li>
                    <hgroup style="margin-bottom: 0;">
                        <h1>R.O.V.E.R</h1>
                        <h2>Release Oriented Vulnerability Evaluation & Reporting</h2>
                    </hgroup>
                </li>
            </ul>
            <ul>
                <li>
                    <details class="dropdown hamburger-menu">
                        <summary aria-label="Menu">
                            <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                                stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                                <line x1="3" y1="12" x2="21" y2="12"></line>
                                <line x1="3" y1="6" x2="21" y2="6"></line>
                                <line x1="3" y1="18" x2="21" y2="18"></line>
                            </svg>
                        </summary>
                        <ul dir="rtl">
                            <li><a href="#"
                                    onclick="document.getElementById('add-repo-modal')?.showModal(); event.preventDefault();">Add
                                    Repository</a></li>
                            <li><a href="#"
                                    onclick="document.getElementById('add-image-modal')?.showModal(); event.preventDefault();">Add
                                    Docker Image</a></li>
                        </ul>
                    </details>
                </li>
            </ul>
        </nav>
    </header>
    <main class="container">
        {% block content %}{% endblock %}
    </main>
    <footer class="container">
        <small>Generated by R.O.V.E.R Dashboard</small>
    </footer>
</body>

</html>
