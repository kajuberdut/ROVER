events {
    worker_connections 1024;
}

http {
    include       mime.types;
    default_type  application/octet-stream;

    sendfile        on;
    keepalive_timeout  65;

    # Map the "rover.local" host to our Falcon application container
    upstream rover_web {
        server web:8000;
    }

    # Map the "auth.rover.local" host to our Authelia container
    upstream authelia {
        server authelia:9091;
    }

    # Server block for rover.local
    server {
        listen 80;
        server_name rover.local;
        return 301 https://$host$request_uri;
    }

    server {
        listen 443 ssl;
        server_name rover.local;

        ssl_certificate /etc/nginx/certs/rover.local.crt;
        ssl_certificate_key /etc/nginx/certs/rover.local.key;

        location / {
            proxy_pass http://rover_web;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }
    }

    # Server block for auth.rover.local
    server {
        listen 80;
        server_name auth.rover.local;
        return 301 https://$host$request_uri;
    }

    server {
        listen 443 ssl;
        server_name auth.rover.local;

        ssl_certificate /etc/nginx/certs/rover.local.crt;
        ssl_certificate_key /etc/nginx/certs/rover.local.key;

        location / {
            proxy_pass http://authelia;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }
    }
}
